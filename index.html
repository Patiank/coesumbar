// ── EXPORT EXCEL ──────────────────────────────────────────────
function exportToExcel(events) {
  const rows = events.map((e,i)=>({
    "No":i+1,"Nama Event":e.namaEvent,"Provinsi / Kabupaten / Kota":e.kabupatenKota,
    "Kategori":e.kategori,"Tanggal Mulai":e.tanggalMulai,"Tanggal Selesai":e.tanggalSelesai||"-",
    "Lokasi / Venue":e.lokasi||"-","Deskripsi":e.deskripsi||"-",
    "Target Wisatawan":e.targetWisatawan?parseInt(e.targetWisatawan):0,
    "Estimasi Anggaran (Rp)":e.anggaran?parseInt(e.anggaran):0,
    "Narahubung":e.kontakNama||"-","No. HP":e.kontakHP||"-",
    "Email":e.kontakEmail||"-","Status":e.status,"Tanggal Input":e.createdAt||"-",
  }));
  const ws=XLSX_LIB.utils.json_to_sheet(rows);
  ws["!cols"]=[{wch:5},{wch:35},{wch:25},{wch:20},{wch:14},{wch:14},{wch:30},{wch:40},{wch:18},{wch:22},{wch:20},{wch:16},{wch:28},{wch:12},{wch:14}];
  const wb=XLSX_LIB.utils.book_new();
  XLSX_LIB.utils.book_append_sheet(wb,ws,"Calendar of Events");
  const kc={},kab={};
  events.forEach(e=>{kc[e.kategori]=(kc[e.kategori]||0)+1;kab[e.kabupatenKota]=(kab[e.kabupatenKota]||0)+1;});
  const s2=[
    {"Ringkasan":"Total Event","Jumlah":events.length},
    {"Ringkasan":"Sudah Diajukan","Jumlah":events.filter(e=>e.status==="Diajukan").length},
    {"Ringkasan":"Masih Draft","Jumlah":events.filter(e=>e.status==="Draft").length},
    {"Ringkasan":"Total Target Wisatawan","Jumlah":events.reduce((s,e)=>s+parseInt(e.targetWisatawan||0),0)},
    {"Ringkasan":"","Jumlah":""},
    {"Ringkasan":"— Per Kategori —","Jumlah":""},
    ...Object.entries(kc).map(([k,v])=>({Ringkasan:k,Jumlah:v})),
    {"Ringkasan":"","Jumlah":""},
    {"Ringkasan":"— Per Kab/Kota —","Jumlah":""},
    ...Object.entries(kab).map(([k,v])=>({Ringkasan:k,Jumlah:v})),
  ];
  const ws2=XLSX_LIB.utils.json_to_sheet(s2); ws2["!cols"]=[{wch:30},{wch:15}];
  XLSX_LIB.utils.book_append_sheet(wb,ws2,"Ringkasan");
  XLSX_LIB.writeFile(wb,`CoE_SumBar_${new Date().toISOString().split("T")[0]}.xlsx`);
}

function exportToJSON(events) {
  const blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),total:events.length,events},null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url;
  a.download=`CoE_SumBar_Backup_${new Date().toISOString().split("T")[0]}.json`;
  a.click(); URL.revokeObjectURL(url);
}

// ══════════════════════════════════════════════════════════════
//  ROOT
// ══════════════════════════════════════════════════════════════
function App() {
  const [user, setUser] = useState(()=>loadSession());

  const login  = (u)=>{ sessionStorage.setItem(SESSION_KEY,JSON.stringify(u)); setUser(u); };
  const logout = ()=>{ sessionStorage.removeItem(SESSION_KEY); setUser(null); };

  if (!user) return <LoginScreen onLogin={login} />;
  return <MainApp user={user} onLogout={logout} />;
}

//  LOGIN SCREEN
// ══════════════════════════════════════════════════════════════

  const [uname, setUname] = useState("");

          <label style={{fontSize:11,color:"#6A5830",display:"block",marginBottom:6}}>Username</label>

        <div style={{marginBottom:8}}>
          <label style={{fontSize:11,color:"#6A5830",display:"block",marginBottom:6}}>Password</label>

            <button onClick={()=>setShow(s=>!s)}

        {err && <div style={{fontSize:11,color:"#E05A5A",marginBottom:10,padding:"6px 10px",background:"rgba(224,90,90,0.08)",borderRadius:5}}>{err}</div>}

        <button onClick={doLogin} style={{
          width:"100%",padding:"11px",background:"linear-gradient(135deg,#C4A03C,#A07828)",
          color:"#0D1B0F",border:"none",borderRadius:8,fontSize:13,fontWeight:"bold",
          cursor:"pointer",marginTop:8,letterSpacing:.5}}>
          Masuk

// ══════════════════════════════════════════════════════════════
//  MAIN APP
// ══════════════════════════════════════════════════════════════
function MainApp({ user, onLogout }) {
  const isProvinsi = user.role === "provinsi";

  const [events, setEvents]               = useState([]);
  const [view,   setView]                 = useState("dashboard");
  const [form,   setForm]                 = useState(initialForm);
  const [editId, setEditId]               = useState(null);
  const [selEvent, setSelEvent]           = useState(null);
  const [filterKab, setFilterKab]         = useState("");
  const [filterKat, setFilterKat]         = useState("");
  const [filterStatus, setFilterStatus]   = useState("");
  const [filterBulan, setFilterBulan]     = useState("");
  const [searchQ, setSearchQ]             = useState("");
  const [calYear,  setCalYear]            = useState(2025);
  const [calMonth, setCalMonth]           = useState(new Date().getMonth());
  const [toast,   setToast]               = useState(null);
  const [delConfirm, setDelConfirm]       = useState(null);
  const [ajukanConfirm, setAjukanConfirm] = useState(null);
  const [importConfirm, setImportConfirm] = useState(null);
  const [aiLoading, setAiLoading]         = useState(false);
  const [aiResult,  setAiResult]          = useState(null);
  const importRef = useRef();

  useEffect(()=>{ setEvents(loadEvents()); },[]);
  useEffect(()=>{ if(events.length>0) localStorage.setItem(STORAGE_KEY,JSON.stringify(events)); },[events]);

  const showToast=(msg,type="success")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),3500); };

  // ── permission helpers ──────────────────────────────────────
  const canEditEvent  = (e) => isProvinsi || e.kabupatenKota === user.kabupatenKota;
  const canAddEvent   = () => true; // both roles can add; kab/kota locked to their region

  // ── CRUD ────────────────────────────────────────────────────
  const handleSubmit = () => {
    // Untuk admin kab/kota, pastikan kabupatenKota selalu terisi dari user session
    const finalForm = !isProvinsi
      ? { ...form, kabupatenKota: user.kabupatenKota }
      : { ...form };

    if (!finalForm.namaEvent || !finalForm.kabupatenKota || !finalForm.tanggalMulai || !finalForm.kategori) {
      // Bantu user tahu field mana yang kosong
      const kosong = [];
      if (!finalForm.namaEvent) kosong.push("Nama Event");
      if (!finalForm.kabupatenKota) kosong.push("Kabupaten/Kota");
      if (!finalForm.tanggalMulai) kosong.push("Tanggal Mulai");
      if (!finalForm.kategori) kosong.push("Kategori");
      showToast("Field wajib belum diisi: " + kosong.join(", "), "error"); return;
    }
    if (editId) {
      setEvents(ev=>ev.map(e=>e.id===editId?{...finalForm,id:editId,createdAt:e.createdAt}:e));
      showToast("Event berhasil diperbarui!");
    } else {
      setEvents(ev=>[...ev,{...finalForm,id:Date.now(),createdAt:new Date().toISOString().split("T")[0]}]);
      showToast("Event berhasil ditambahkan!");
    }
    setForm(initialForm); setEditId(null); setView("list");
  };

  const handleEdit = (e) => {
    if (!canEditEvent(e)) return;
    setForm({...e}); setEditId(e.id); setView("form");
  };

  const handleDelete = (id) => {
    setEvents(ev=>ev.filter(e=>e.id!==id));
    setDelConfirm(null); showToast("Event berhasil dihapus.","info");
    if (view==="detail") setView("list");
  };

  const handleAjukan = (id) => {
    setEvents(ev=>ev.map(e=>e.id===id?{...e,status:"Diajukan"}:e));
    if (selEvent?.id===id) setSelEvent(s=>({...s,status:"Diajukan"}));
    setAjukanConfirm(null);
    showToast("Event berhasil diajukan ke Dinas Provinsi! ✓");
  };

  // ── IMPORT ──────────────────────────────────────────────────
  const handleImportFile = (e) => {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try {
        const parsed=JSON.parse(ev.target.result);
        const imported=parsed.events||(Array.isArray(parsed)?parsed:null);
        if(!imported||!imported.length){ showToast("File tidak valid atau kosong.","error"); return; }
        setImportConfirm({events:imported,count:imported.length});
      } catch { showToast("Gagal membaca file JSON.","error"); }
    };
    reader.readAsText(file); e.target.value="";
  };

  const confirmImport = (mode) => {
    if(!importConfirm) return;
    if(mode==="replace"){
      setEvents(importConfirm.events);
      localStorage.setItem(STORAGE_KEY,JSON.stringify(importConfirm.events));
      showToast(`${importConfirm.count} event berhasil di-restore.`);
    } else {
      const merged=[...events,...importConfirm.events.filter(ie=>!events.find(e=>e.id===ie.id))];
      setEvents(merged); localStorage.setItem(STORAGE_KEY,JSON.stringify(merged));
      showToast(`${importConfirm.count} event berhasil digabungkan.`);
    }
    setImportConfirm(null);
  };

  // ── AI ───────────────────────────────────────────────────────
  const generateAI = async()=>{
    setAiLoading(true); setAiResult(null);
    try {
      const summary=events.map(e=>`- ${e.namaEvent} (${e.kabupatenKota}, ${e.kategori}, ${e.tanggalMulai}, status:${e.status})`).join("\n");
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
          messages:[{role:"user",content:`Kamu adalah analis pariwisata Sumatera Barat. Berikan analisis singkat (3-4 paragraf) tentang Calendar of Events berikut, mencakup: distribusi event per kategori, potensi wisatawan, rekomendasi pengembangan, dan event unggulan. Gunakan bahasa Indonesia formal.\n\nDaftar Event:\n${summary}`}]})});
      const data=await res.json();
      setAiResult(data.content?.[0]?.text||"Gagal menganalisis.");
    } catch { setAiResult("Terjadi kesalahan saat menghubungi AI."); }
    setAiLoading(false);
  };

  // ── FILTER ───────────────────────────────────────────────────
  const filtered = events.filter(e=>{
    const q=searchQ.toLowerCase();
    return (!q||e.namaEvent.toLowerCase().includes(q)||e.lokasi?.toLowerCase().includes(q))
      &&(!filterKab||e.kabupatenKota===filterKab)
      &&(!filterKat||e.kategori===filterKat)
      &&(!filterStatus||e.status===filterStatus)
      &&(!filterBulan||(e.tanggalMulai&&new Date(e.tanggalMulai).getMonth()===parseInt(filterBulan)));
  });

  // ── CALENDAR ─────────────────────────────────────────────────
  const getDIM=(y,m)=>new Date(y,m+1,0).getDate();
  const getFD =(y,m)=>new Date(y,m,1).getDay();
  const eInDay=(day)=>events.filter(e=>{
    if(!e.tanggalMulai) return false;
    const s=new Date(e.tanggalMulai), en=e.tanggalSelesai?new Date(e.tanggalSelesai):s;
    const d=new Date(calYear,calMonth,day); return d>=s&&d<=en;
  });

  // ── STATS ────────────────────────────────────────────────────
  const totalEvt   = events.length;
  const totalTarget= events.reduce((s,e)=>s+parseInt(e.targetWisatawan||0),0);
  const diajukan   = events.filter(e=>e.status==="Diajukan").length;
  const draftEvt   = events.filter(e=>e.status==="Draft").length;

  // ── NAV ──────────────────────────────────────────────────────
  const navItems=[
    {key:"dashboard",label:"Dashboard",   icon:"◈"},
    {key:"form",     label:"Tambah Event",icon:"✦"},
    {key:"list",     label:"Daftar Event",icon:"≡"},
    {key:"calendar", label:"Kalender",    icon:"⊞"},
  ];
  const viewLabel={dashboard:"Dashboard Ikhtisar",form:editId?"Edit Event":"Tambah Event Baru",
    list:"Daftar Seluruh Event",calendar:"Tampilan Kalender",detail:"Detail Event"}[view];

  // ══════════════════════════════════════════════════════════════
  return (
    <div style={{fontFamily:"'Georgia','Times New Roman',serif",minHeight:"100vh",background:"#0D1B0F",color:"#E8DCC8"}}>
      <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",
        backgroundImage:`radial-gradient(ellipse at 20% 50%,rgba(196,160,60,.07) 0%,transparent 60%),
                         radial-gradient(ellipse at 80% 20%,rgba(34,85,34,.14) 0%,transparent 50%)`}} />

      {/* ── SIDEBAR ── */}
      <div style={{position:"fixed",left:0,top:0,bottom:0,width:232,
        background:"rgba(7,18,9,0.98)",borderRight:"1px solid rgba(196,160,60,0.15)",

                    )}
                  </div>

                  {[
                    ["Provinsi / Kabupaten / Kota",selEvent.kabupatenKota],
                    ["Kategori",selEvent.kategori],
                    ["Tanggal Mulai",selEvent.tanggalMulai],
                    ["Tanggal Selesai",selEvent.tanggalSelesai||"-"],
                    ["Lokasi",selEvent.lokasi||"-"],
                    ["Target Wisatawan",selEvent.targetWisatawan?parseInt(selEvent.targetWisatawan).toLocaleString("id-ID")+" orang":"-"],
                    ["Estimasi Anggaran","Rp "+parseInt(selEvent.anggaran||0).toLocaleString("id-ID")],
                    ["Kontak",selEvent.kontakNama?`${selEvent.kontakNama} · ${selEvent.kontakHP}`:"-"],
                    ["Email",selEvent.kontakEmail||"-"],
                  ].map(([k,v])=>(
                    <div key={k} style={{display:"flex",gap:14,padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                      <div style={{fontSize:11,color:"#4A4030",minWidth:140}}>{k}</div>
                      <div style={{fontSize:13,color:"#C8BAA0"}}>{v}</div>
                    </div>
                  ))}
                  {selEvent.deskripsi&&(
                    <div style={{marginTop:14}}>
                      <div style={{fontSize:11,color:"#4A4030",marginBottom:7}}>Deskripsi</div>
                      <div style={{fontSize:13,color:"#C8BAA0",lineHeight:1.7}}>{selEvent.deskripsi}</div>
                    </div>
                  )}
                </div>
              </div>
            );
          })()}

        </div>
      </div>

      {/* ── TOAST ── */}
      {toast&&(
        <div style={{position:"fixed",bottom:22,right:22,zIndex:999,
          background:toast.type==="error"?"#2A0808":toast.type==="info"?"#08102A":"#082214",
          border:`1px solid ${toast.type==="error"?"#E05A5A":toast.type==="info"?"#7EB8F7":"#4CAF82"}`,
          color:"#E8DCC8",padding:"11px 18px",borderRadius:8,fontSize:12,
          boxShadow:"0 4px 20px rgba(0,0,0,0.5)",maxWidth:300}}>
          {toast.msg}
        </div>
      )}

      {/* ── DELETE CONFIRM ── */}
      {delConfirm&&(
        <Modal>
          <div style={{fontSize:28,marginBottom:8}}>⚠</div>
          <div style={{fontSize:14,color:"#E8DCC8",marginBottom:5}}>Hapus Event?</div>
          <div style={{fontSize:11,color:"#4A4030",marginBottom:18}}>Tindakan ini tidak dapat dibatalkan.</div>
          <div style={{display:"flex",gap:10,justifyContent:"center"}}>
            <button onClick={()=>handleDelete(delConfirm)}
              style={{padding:"8px 18px",background:"rgba(140,20,20,0.8)",color:"#FFD0D0",border:"1px solid #E05A5A",borderRadius:6,cursor:"pointer",fontSize:12}}>
              Ya, Hapus
            </button>
            <button onClick={()=>setDelConfirm(null)}
              style={{padding:"8px 16px",background:"transparent",color:"#7A6E5A",border:"1px solid rgba(196,160,60,0.18)",borderRadius:6,cursor:"pointer",fontSize:12}}>
              Batal
            </button>
          </div>
        </Modal>
      )}

      {/* ── AJUKAN CONFIRM ── */}
      {ajukanConfirm&&(
        <Modal>
          <div style={{fontSize:28,marginBottom:8}}>✉</div>
          <div style={{fontSize:14,color:"#E8DCC8",marginBottom:5}}>Ajukan Event?</div>
          <div style={{fontSize:11,color:"#4A4030",marginBottom:6}}>
            Event akan dikirimkan ke Dinas Pariwisata Provinsi Sumatera Barat.
          </div>
          <div style={{fontSize:10,color:"#3A3020",marginBottom:18}}>Status akan berubah menjadi <strong style={{color:"#4CAF82"}}>Diajukan</strong> dan tidak dapat diubah kembali ke Draft.</div>
          <div style={{display:"flex",gap:10,justifyContent:"center"}}>
            <button onClick={()=>handleAjukan(ajukanConfirm)}
              style={{padding:"8px 18px",background:"rgba(76,175,130,0.2)",color:"#4CAF82",border:"1px solid rgba(76,175,130,0.4)",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:700}}>
              Ya, Ajukan
            </button>
            <button onClick={()=>setAjukanConfirm(null)}
              style={{padding:"8px 16px",background:"transparent",color:"#7A6E5A",border:"1px solid rgba(196,160,60,0.18)",borderRadius:6,cursor:"pointer",fontSize:12}}>
              Batal
            </button>
          </div>
        </Modal>
      )}

      {/* ── IMPORT CONFIRM ── */}
      {importConfirm&&(
        <Modal>
          <div style={{fontSize:28,marginBottom:8}}>📂</div>
          <div style={{fontSize:14,color:"#E8DCC8",marginBottom:5}}>File Backup Ditemukan</div>
          <div style={{fontSize:12,color:"#7A6E5A",marginBottom:16}}>
            <strong style={{color:"#C4A03C"}}>{importConfirm.count} event</strong> siap diimport.
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:9,width:"100%"}}>
            <button onClick={()=>confirmImport("merge")}
              style={{padding:"10px",background:"rgba(196,160,60,0.08)",border:"1px solid rgba(196,160,60,0.25)",color:"#C4A03C",borderRadius:8,cursor:"pointer",fontSize:12}}>
              🔀 Gabungkan dengan data saat ini
            </button>
            <button onClick={()=>confirmImport("replace")}
              style={{padding:"10px",background:"rgba(224,90,90,0.08)",border:"1px solid rgba(224,90,90,0.22)",color:"#E05A5A",borderRadius:8,cursor:"pointer",fontSize:12}}>
              ♻ Ganti semua data dengan file ini
            </button>
            <button onClick={()=>setImportConfirm(null)}
              style={{padding:"8px",background:"transparent",border:"1px solid rgba(255,255,255,0.05)",color:"#4A4030",borderRadius:8,cursor:"pointer",fontSize:11}}>
              Batal
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── SHARED COMPONENTS ─────────────────────────────────────────
function Modal({children}) {
  return(
    <div style={{position:"fixed",inset:0,zIndex:200,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#0B1A0D",border:"1px solid rgba(196,160,60,0.15)",borderRadius:14,padding:28,maxWidth:370,width:"90%",textAlign:"center"}}>
        {children}
      </div>
    </div>
  );
}

function SidebarAction({icon,label,sub,color,onClick}) {
  const [hover,setHover]=useState(false);
  return(
    <button onClick={onClick} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{display:"flex",alignItems:"center",gap:10,width:"100%",
        padding:"8px 12px",marginBottom:2,borderRadius:7,border:"none",
        background:hover?"rgba(255,255,255,0.035)":"transparent",cursor:"pointer",textAlign:"left",transition:"background 0.15s"}}>
      <span style={{fontSize:15}}>{icon}</span>
      <div>
        <div style={{fontSize:12,color,fontWeight:600}}>{label}</div>
        <div style={{fontSize:9,color:"#2A2015",marginTop:1}}>{sub}</div>
      </div>
    </button>
  );
}

function FormSection({title,children}) {
  return(
    <div style={{marginBottom:20}}>
      <div style={{fontSize:10,color:"#C4A03C",letterSpacing:2,textTransform:"uppercase",
        marginBottom:12,paddingBottom:7,borderBottom:"1px solid rgba(196,160,60,0.1)"}}>
        {title}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>{children}</div>
    </div>
  );
}

function FormField({label,children,full}) {
  return(
    <div style={{gridColumn:full?"1 / -1":"auto"}}>
      <label style={{fontSize:11,color:"#4A4030",display:"block",marginBottom:5}}>{label}</label>
      {children}
    </div>
  );
}

function StatusBadge({status}) {
  const s=STATUS_BADGE[status]||STATUS_BADGE["Draft"];
  return(
    <span style={{fontSize:10,padding:"2px 8px",borderRadius:4,
      background:s.bg,color:s.color,border:`1px solid ${s.border}`,fontFamily:"sans-serif"}}>
      {status}
    </span>
  );
}

const IS={background:"rgba(255,255,255,0.04)",border:"1px solid rgba(196,160,60,0.16)",
  color:"#E8DCC8",padding:"9px 12px",borderRadius:6,fontSize:13,outline:"none",fontFamily:"inherit"};

const SB=(color)=>({padding:"5px 11px",background:"transparent",
  border:`1px solid ${color}40`,color,borderRadius:6,fontSize:11,cursor:"pointer"});


    const rootEl = ReactDOM.createRoot(document.getElementById('root'));
    rootEl.render(React.createElement(App));
  </script>
